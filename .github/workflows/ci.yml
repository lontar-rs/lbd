name: CI

on:
  push:
    paths-ignore: ['docs/**']
  pull_request:
    paths-ignore: ['docs/**']

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Check build
        run: cargo check --all-targets --all-features

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: lbd_test_password
          POSTGRES_USER: lbd_test
          POSTGRES_DB: lbd_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --features postgres --locked
      - name: Setup database
        run: |
          export DATABASE_URL=postgresql://lbd_test:lbd_test_password@localhost:5432/lbd_test
          sqlx database create
          sqlx migrate run --source migrations
        env:
          DATABASE_URL: postgresql://lbd_test:lbd_test_password@localhost:5432/lbd_test
      - name: Run tests
        run: cargo test --all-features
        env:
          DATABASE_URL: postgresql://lbd_test:lbd_test_password@localhost:5432/lbd_test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [check, test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --all --release --all-features
